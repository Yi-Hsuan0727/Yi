<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      background: #fff;
      color: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 220px;
      padding: 24px;
      gap: 14px;
    }
    h2 {
      font-size: 15px;
      font-weight: 700;
      text-align: center;
    }
    p {
      font-size: 12px;
      color: #555;
      text-align: center;
      line-height: 1.5;
    }
    button {
      background: #2ecc71;
      color: #fff;
      border: none;
      border-radius: 999px;
      padding: 10px 28px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      transition: background 0.2s;
    }
    button:hover { background: #27ae60; }
    button:disabled { background: #aaa; cursor: default; }
    #status { font-size: 11px; color: #2ecc71; display: none; }
  </style>
</head>
<body>
  <h2>Michelle Chen Portfolio</h2>
  <p>Generates a 1440×960 Figma design frame<br>based on <code>index.html</code>.</p>
  <button id="btn" onclick="generate()">Generate Design</button>
  <span id="status">Design generated!</span>

  <script>
    function generate() {
      document.getElementById('btn').disabled = true;
      document.getElementById('btn').textContent = 'Generating…';
      parent.postMessage({ pluginMessage: { type: 'generate' } }, '*');
    }
    window.onmessage = function(event) {
      if (event.data.pluginMessage && event.data.pluginMessage.type === 'done') {
        document.getElementById('status').style.display = 'block';
      }
    };
  </script>
</body>
</html>
