<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>3D Fish Tank · three.js</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #021019; }
  canvas { display: block; }
  .ui { position: fixed; left: 16px; top: 14px; display: flex; gap: 8px; flex-wrap: wrap; z-index: 5;
        font: 13px/1 ui-sans-serif, system-ui, sans-serif; }
  .ui button { border: 0; padding: 9px 13px; border-radius: 10px; cursor: pointer;
        background: rgba(255,255,255,.14); color: #eaf6ff; backdrop-filter: blur(6px); transition: background .15s; }
  .ui button:hover { background: rgba(255,255,255,.28); }
  .hint { position: fixed; left: 16px; bottom: 14px; z-index: 5;
        font: 13px/1.5 ui-monospace, Menlo, monospace; color: #9fc7da; user-select: none; }
  .hint b { color: #d8f1ff; }
</style>
    <script src="https://t.contentsquare.net/uxa/71f187ae3daf5.js" defer></script>
</head>
<body>
<div class="ui">
  <button id="add">+ Add fish</button>
  <button id="school">+ School</button>
  <button id="feed">🍤 Feed</button>
  <button id="reset">Reset</button>
</div>
<div class="hint"><b>Drag</b> to orbit · <b>Scroll</b> to zoom · <b>Click</b> inside the tank to drop food the fish chase</div>
<script>
const TANK = { x: 60, y: 34, z: 40 };   // half-extents
let scene, camera, renderer, clock;
let fish = [], bubbles = [], foods = [], plants = [];
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let camRadius, camAzim, camPolar, dragging=false, lastX, lastY, causticLight, cursor3D=null;
const _pool=[]; let _pi=0;

const SPECIES = [
  { name:'clown',  body:0xff7a1a, belly:0xffd9a8, fin:0xffffff, len:7,  speed:11 },
  { name:'tang',   body:0x2f6ee0, belly:0x6fb0ff, fin:0xffd028, len:7.5,speed:12 },
  { name:'yellow', body:0xf5d23a, belly:0xfff4c0, fin:0x554a2a, len:6.5,speed:10 },
  { name:'koi',    body:0xfafafa, belly:0xff8a6a, fin:0xffb4aa, len:9,  speed:8  },
  { name:'tetra',  body:0x40d6ff, belly:0xffffff, fin:0xcfeaff, len:4,  speed:16 },
  { name:'puffer', body:0xc8b478, belly:0xf2e6b0, fin:0xd0c090, len:6,  speed:6  },
];

init();
animate();

function init() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x03263b);
  scene.fog = new THREE.FogExp2(0x03263b, 0.006);

  camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 1000);
  camRadius = 150; camAzim = 0.7; camPolar = 1.25; updateCamera();

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  document.body.appendChild(renderer.domElement);
  clock = new THREE.Clock();

  // lights
  scene.add(new THREE.AmbientLight(0x6fb6e0, 0.7));
  const sun = new THREE.DirectionalLight(0xffffff, 0.9); sun.position.set(40, 120, 60); scene.add(sun);
  const fillc = new THREE.PointLight(0x33ccff, 0.6, 400); fillc.position.set(-60, 40, -40); scene.add(fillc);
  causticLight = new THREE.PointLight(0xbfeaff, 0.5, 300); causticLight.position.set(0, TANK.y, 0); scene.add(causticLight);

  buildTank();
  for (const s of SPECIES) addFish(s);
  for (let i=0;i<14;i++) addFish(SPECIES[4], true);      // school of tetras
  for (let i=0;i<70;i++) bubbles.push(makeBubble());
  for (let i=0;i<18;i++) makePlant();

  // input
  addEventListener('resize', onResize);
  const el = renderer.domElement;
  el.addEventListener('mousedown', onDown);
  addEventListener('mouseup', ()=> dragging=false);
  addEventListener('mousemove', onMove);
  el.addEventListener('wheel', e=>{ camRadius = THREE.MathUtils.clamp(camRadius + e.deltaY*0.08, 70, 280); updateCamera(); }, {passive:true});
  el.addEventListener('click', onClick);
  document.getElementById('add').onclick   = ()=> addFish(SPECIES[Math.floor(Math.random()*SPECIES.length)]);
  document.getElementById('school').onclick= ()=> { for(let i=0;i<10;i++) addFish(SPECIES[4], true); };
  document.getElementById('feed').onclick  = ()=> { for(let i=0;i<8;i++) dropFood(rnd(-30,30), TANK.y-4, rnd(-20,20)); };
  document.getElementById('reset').onclick = ()=> location.reload();
}

// ---------- camera ----------
function updateCamera(){
  camPolar = THREE.MathUtils.clamp(camPolar, 0.25, Math.PI-0.25);
  camera.position.set(
    camRadius*Math.sin(camPolar)*Math.cos(camAzim),
    camRadius*Math.cos(camPolar),
    camRadius*Math.sin(camPolar)*Math.sin(camAzim));
  camera.lookAt(0,0,0);
}
function onDown(e){ dragging=true; lastX=e.clientX; lastY=e.clientY; }
function onMove(e){
  mouse.x = (e.clientX/innerWidth)*2-1; mouse.y = -(e.clientY/innerHeight)*2+1;
  if(!dragging) return;
  camAzim += (e.clientX-lastX)*0.005; camPolar -= (e.clientY-lastY)*0.005;
  lastX=e.clientX; lastY=e.clientY; updateCamera();
}

// ---------- tank ----------
function buildTank() {
  const g = new THREE.BoxGeometry(TANK.x*2, TANK.y*2, TANK.z*2);
  const glass = new THREE.Mesh(g, new THREE.MeshPhysicalMaterial({
    color:0x9fdcff, transparent:true, opacity:0.08, roughness:0, metalness:0,
    transmission:0.9, side:THREE.BackSide }));
  scene.add(glass);
  const edges = new THREE.LineSegments(new THREE.EdgesGeometry(g),
    new THREE.LineBasicMaterial({ color:0xbfeaff, transparent:true, opacity:0.35 }));
  scene.add(edges);
  // sandy floor
  const floor = new THREE.Mesh(new THREE.PlaneGeometry(TANK.x*2, TANK.z*2, 40, 40),
    new THREE.MeshStandardMaterial({ color:0xe3cd96, roughness:1 }));
  const pos = floor.geometry.attributes.position;
  for (let i=0;i<pos.count;i++) pos.setZ(i, Math.random()*2.2);
  floor.geometry.computeVertexNormals();
  floor.rotation.x = -Math.PI/2; floor.position.y = -TANK.y+0.5; scene.add(floor);
  // water volume tint
  const vol = new THREE.Mesh(g, new THREE.MeshBasicMaterial({ color:0x0a5f8c, transparent:true, opacity:0.12, side:THREE.BackSide }));
  scene.add(vol);
}

function makePlant() {
  const x = rnd(-TANK.x+6, TANK.x-6), z = rnd(-TANK.z+6, TANK.z-6);
  const h = rnd(12, 26), seg = Math.floor(rnd(4,7));
  const group = new THREE.Group();
  let yy = -TANK.y+1;
  for (let s=0;s<seg;s++){
    const k=s/seg, r=1.6*(1-k*0.5);
    const m = new THREE.Mesh(new THREE.SphereGeometry(r, 8, 8),
      new THREE.MeshStandardMaterial({ color:new THREE.Color().setHSL(0.34-0.04*k, 0.6, 0.32+0.18*k), roughness:0.8 }));
    m.scale.set(1, h/seg/r/2, 1); m.position.y = yy + (h/seg)/2; yy += h/seg;
    group.add(m);
  }
  group.position.set(x, 0, z); group.userData = { phase: Math.random()*7, amp: rnd(0.06,0.16) };
  plants.push(group); scene.add(group);
}

// ---------- fish ----------
function makeFin(color, w, h, d){
  return new THREE.Mesh(new THREE.ConeGeometry(w, h, 4),
    new THREE.MeshStandardMaterial({ color, roughness:0.5, transparent:true, opacity:0.92, side:THREE.DoubleSide }));
}
function addFish(sp, schooling=false){
  const L = sp.len * rnd(0.85,1.2);
  const g = new THREE.Group();
  const bodyMat = new THREE.MeshStandardMaterial({ color:sp.body, roughness:0.45, metalness:0.05 });
  const body = new THREE.Mesh(new THREE.SphereGeometry(L*0.5, 18, 14), bodyMat);
  body.scale.set(1.7, 1, 0.7); g.add(body);
  const belly = new THREE.Mesh(new THREE.SphereGeometry(L*0.46, 16, 12),
    new THREE.MeshStandardMaterial({ color:sp.belly, roughness:0.5 }));
  belly.scale.set(1.55, 0.7, 0.55); belly.position.y = -L*0.12; g.add(belly);
  // tail
  const tail = makeFin(sp.fin, L*0.5, L*0.9, 0);
  tail.rotation.z = Math.PI/2; tail.position.x = -L*0.95; g.add(tail);
  // dorsal + side fins
  const dorsal = makeFin(sp.fin, L*0.3, L*0.7); dorsal.position.set(0, L*0.5, 0); g.add(dorsal);
  const sideL = makeFin(sp.fin, L*0.22, L*0.5); sideL.rotation.x = Math.PI/2; sideL.position.set(L*0.2,0,L*0.35); g.add(sideL);
  const sideR = sideL.clone(); sideR.position.z = -L*0.35; g.add(sideR);
  // eyes
  const eyeG = new THREE.SphereGeometry(L*0.12, 10, 10);
  const white = new THREE.MeshStandardMaterial({ color:0xffffff });
  const black = new THREE.MeshStandardMaterial({ color:0x111111 });
  for (const zz of [1,-1]) {
    const e = new THREE.Mesh(eyeG, white); e.position.set(L*0.62, L*0.12, zz*L*0.26); g.add(e);
    const p = new THREE.Mesh(new THREE.SphereGeometry(L*0.06,8,8), black); p.position.set(L*0.70, L*0.12, zz*L*0.30); g.add(p);
  }
  g.position.set(rnd(-TANK.x+10,TANK.x-10), rnd(-TANK.y+8,TANK.y-8), rnd(-TANK.z+10,TANK.z-10));
  scene.add(g);
  fish.push({ mesh:g, tail, sideL, sideR, len:L, speed:sp.speed*rnd(0.85,1.15), schooling,
    vel:new THREE.Vector3(rnd(-1,1),rnd(-.3,.3),rnd(-1,1)).normalize().multiplyScalar(8),
    target:randPoint(), wt:0, phase:Math.random()*7, fear:0 });
}
function randPoint(){ return new THREE.Vector3(rnd(-TANK.x+8,TANK.x-8), rnd(-TANK.y+6,TANK.y-6), rnd(-TANK.z+8,TANK.z-8)); }

function updateFish(f, dt, time){
  const p = f.mesh.position;
  const steer = new THREE.Vector3();

  // wander toward a roaming target
  f.wt -= dt;
  if (f.wt <= 0 || p.distanceTo(f.target) < 8){ f.target = randPoint(); f.wt = rnd(2,5); }
  steer.add(tmp().subVectors(f.target, p).normalize().multiplyScalar(1.0));

  // seek nearest food
  let best=null, bd=1e9;
  for (const fd of foods){ const d=p.distanceTo(fd.mesh.position); if(d<bd){bd=d;best=fd;} }
  if (best && bd < 80){ steer.add(tmp().subVectors(best.mesh.position, p).normalize().multiplyScalar(2.4));
    if (bd < f.len){ best.eaten=true; for(let i=0;i<5;i++){ const b=makeBubble(); b.mesh.position.copy(p); } } }

  // schooling
  if (f.schooling){ const c=new THREE.Vector3(); let n=0; const sep=new THREE.Vector3();
    for (const o of fish){ if(o===f||!o.schooling) continue; const d=p.distanceTo(o.mesh.position);
      if(d<22){ c.add(o.mesh.position); n++; if(d<8) sep.add(tmp().subVectors(p,o.mesh.position).divideScalar(d*d+0.01)); } }
    if(n){ c.divideScalar(n); steer.add(tmp().subVectors(c,p).normalize().multiplyScalar(0.6)); steer.add(sep.multiplyScalar(8)); }
  }

  // avoid cursor ray (project mouse into 3D, repel if near)
  if (cursor3D){ const d=p.distanceTo(cursor3D); if(d<26){ f.fear=1; steer.add(tmp().subVectors(p,cursor3D).normalize().multiplyScalar(3.5)); } }
  f.fear *= 0.94;

  // keep inside tank
  const m=8;
  if (p.x> TANK.x-m) steer.x-=1.5; if (p.x<-TANK.x+m) steer.x+=1.5;
  if (p.y> TANK.y-m) steer.y-=1.5; if (p.y<-TANK.y+m) steer.y+=1.5;
  if (p.z> TANK.z-m) steer.z-=1.5; if (p.z<-TANK.z+m) steer.z+=1.5;

  const maxS = f.speed*(1+f.fear*1.4);
  f.vel.add(steer.multiplyScalar(dt*6));
  if (f.vel.length()>maxS) f.vel.setLength(maxS);
  if (f.vel.length()<3) f.vel.setLength(3);
  p.addScaledVector(f.vel, dt);

  // orient along velocity
  const look = tmp().copy(p).add(f.vel);
  f.mesh.lookAt(look);
  f.mesh.rotateY(Math.PI/2);   // model faces +x
  // tail + fin wiggle
  const wig = Math.sin(time*( 8 + f.vel.length()*0.5) + f.phase);
  f.tail.rotation.y = wig*0.6;
  f.sideL.rotation.z = Math.PI/2 + wig*0.3;
  f.sideR.rotation.z = Math.PI/2 - wig*0.3;
}

// ---------- bubbles / food ----------
function makeBubble(){
  const r = rnd(0.3,1.1);
  const m = new THREE.Mesh(new THREE.SphereGeometry(r, 8, 8),
    new THREE.MeshStandardMaterial({ color:0xcdeeff, transparent:true, opacity:0.5, roughness:0 }));
  m.position.set(rnd(-TANK.x,TANK.x), rnd(-TANK.y,TANK.y), rnd(-TANK.z,TANK.z));
  scene.add(m);
  const b = { mesh:m, spd:rnd(6,14), wob:Math.random()*7 };
  bubbles.push(b); return b;
}
function dropFood(x,y,z){
  const m = new THREE.Mesh(new THREE.SphereGeometry(0.9, 8, 8),
    new THREE.MeshStandardMaterial({ color:0xff9a4a, emissive:0x662200, roughness:0.6 }));
  m.position.set(x,y,z); scene.add(m); foods.push({ mesh:m, vy:0 });
}

// ---------- interaction ----------
function onClick(e){
  mouse.x=(e.clientX/innerWidth)*2-1; mouse.y=-(e.clientY/innerHeight)*2+1;
  raycaster.setFromCamera(mouse, camera);
  // drop food at a point near the top of the tank along the ray
  const pt = raycaster.ray.at(camRadius*0.85, new THREE.Vector3());
  pt.x=THREE.MathUtils.clamp(pt.x,-TANK.x+6,TANK.x-6);
  pt.y=THREE.MathUtils.clamp(pt.y,-TANK.y+6,TANK.y-6);
  pt.z=THREE.MathUtils.clamp(pt.z,-TANK.z+6,TANK.z-6);
  dropFood(pt.x, Math.max(pt.y, TANK.y-8), pt.z);
}

// ---------- loop ----------
function tmp(){ if(_pi>=_pool.length)_pool.push(new THREE.Vector3()); return _pool[_pi++].set(0,0,0); }
function rnd(a,b){ return a + Math.random()*(b-a); }

function animate(){
  requestAnimationFrame(animate);
  _pi=0;
  const dt = Math.min(clock.getDelta(), 0.05);
  const time = clock.elapsedTime;

  // cursor projected to tank-center depth (for fish avoidance)
  raycaster.setFromCamera(mouse, camera);
  cursor3D = raycaster.ray.at(camRadius*0.85, new THREE.Vector3());

  for (const f of fish) updateFish(f, dt, time);

  // bubbles rise
  for (const b of bubbles){ b.wob+=dt*4; b.mesh.position.y += b.spd*dt;
    b.mesh.position.x += Math.sin(b.wob)*0.05;
    if (b.mesh.position.y > TANK.y){ b.mesh.position.y=-TANK.y; b.mesh.position.x=rnd(-TANK.x,TANK.x); b.mesh.position.z=rnd(-TANK.z,TANK.z);} }

  // food sinks; remove eaten
  for (let i=foods.length-1;i>=0;i--){ const fd=foods[i];
    fd.vy=Math.min(fd.vy+dt*8, 10); fd.mesh.position.y -= fd.vy*dt;
    if (fd.mesh.position.y < -TANK.y+2) fd.mesh.position.y=-TANK.y+2;
    if (fd.eaten){ scene.remove(fd.mesh); foods.splice(i,1); } }

  // plants sway
  for (const pl of plants){ pl.rotation.z = Math.sin(time*1.2 + pl.userData.phase)*pl.userData.amp; }

  // caustic light drift
  if (causticLight){ causticLight.position.x = Math.sin(time*0.4)*30; causticLight.position.z = Math.cos(time*0.3)*24; }

  renderer.render(scene, camera);
}
function onResize(){ camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth, innerHeight); }
</script>
</body>
</html>
